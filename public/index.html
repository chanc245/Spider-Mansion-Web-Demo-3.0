<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- favicon: inline spider web emoji-->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕸️</text></svg>"
    />

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.8/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.8/lib/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Spider Mansion 3.0 Demo</title>
  </head>
  <body>
    <!-- Custom loading screen. p5 looks for #p5_loading during preload() and
         auto-removes it once all assets finish loading. -->
    <div id="p5_loading">
      <svg class="sm-corner sm-corner-l" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="none" stroke="#cfc8da" stroke-width="0.6">
          <line x1="0" y1="0" x2="100" y2="0" />
          <line x1="0" y1="0" x2="92" y2="38" />
          <line x1="0" y1="0" x2="71" y2="71" />
          <line x1="0" y1="0" x2="38" y2="92" />
          <line x1="0" y1="0" x2="0" y2="100" />
          <path d="M22 0 A22 22 0 0 1 0 22" />
          <path d="M48 0 A48 48 0 0 1 0 48" />
          <path d="M74 0 A74 74 0 0 1 0 74" />
          <path d="M98 0 A98 98 0 0 1 0 98" />
        </g>
      </svg>
      <svg class="sm-corner sm-corner-r" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="none" stroke="#cfc8da" stroke-width="0.6">
          <line x1="0" y1="0" x2="100" y2="0" />
          <line x1="0" y1="0" x2="92" y2="38" />
          <line x1="0" y1="0" x2="71" y2="71" />
          <line x1="0" y1="0" x2="38" y2="92" />
          <line x1="0" y1="0" x2="0" y2="100" />
          <path d="M22 0 A22 22 0 0 1 0 22" />
          <path d="M48 0 A48 48 0 0 1 0 48" />
          <path d="M74 0 A74 74 0 0 1 0 74" />
          <path d="M98 0 A98 98 0 0 1 0 98" />
        </g>
      </svg>

      <div class="sm-loader">
        <div class="sm-drop" title="boo!">
          <span class="sm-thread"></span>
          <span class="sm-spider">🕷️</span>
        </div>
        <div class="sm-title">loading<span class="sm-dots"><span>.</span><span>.</span><span>.</span></span></div>
        <div class="sm-sub">entering the mansion</div>
      </div>
    </div>

    <div id="canvas-container"></div>
    <main></main>

    <!-- helpers -->
    <script src="classes/Tween.js"></script>
    <script src="classes/TagOverlayAnimator.js"></script>
    <script src="classes/TutorialOverlay.js"></script>
    <script src="classes/AudioManager.js"></script>
    <script src="classes/Util.js"></script>

    <script src="d0_DialogScript.js"></script>
    <script src="d1_DialogScript.js"></script>
    <script src="d1_RoomConfig.js"></script>

    <!-- classes -->
    <script src="classes/Dialog.js"></script>
    <!-- scene/activity managers (formerly StateManagers.js) -->
    <script src="classes/PA_InvestigateManager.js"></script>
    <script src="classes/DIA_OptionManager.js"></script>
    <script src="classes/PA_GameManager.js"></script>
    <script src="classes/PA_DinnerManager.js"></script>
    <script src="classes/PR_MusicSearchManager.js"></script>
    <script src="classes/PA_WebInvestigateManager.js"></script>
    <script src="classes/EvaAI.js"></script>
    <script src="classes/QuizNotebook.js"></script>
    <script src="classes/QuizLog.js"></script>

    <!-- sketch -->
    <script src="sketch.js"></script>

    <!-- debug panel — only active when ?debug=1 is in the URL -->
    <script src="debug.js"></script>
  </body>
</html>
